<!-- note.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Note</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#e5ddd5;
overflow:hidden;
}

/* Background pattern */

body::before{
content:'';
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(#d1d7db 1px, transparent 1px);
background-size:22px 22px;
opacity:0.4;
z-index:-1;
}

/* Card */

.container{
width:90%;
max-width:400px;
background:white;
padding:35px 25px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.12);
text-align:center;
}

/* Title */

h1{
font-size:30px;
font-weight:700;
color:#111b21;
margin-bottom:25px;
}

/* Textarea */

textarea{
width:100%;
height:140px;
padding:18px;
border:none;
outline:none;
resize:none;
border-radius:18px;
background:#f0f2f5;
font-size:15px;
margin-bottom:20px;
border:2px solid transparent;
transition:0.3s;
}

textarea:focus{
border-color:#25d366;
background:white;
}

textarea::placeholder{
color:#667781;
}

/* Button */

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#25d366;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
background:#20bd5a;
}

/* Success */

.success{
display:none;
margin-top:18px;
font-size:18px;
font-weight:600;
color:#25d366;
}

</style>
</head>

<body>

<div class="container">

<h1>Add a Note 📝</h1>

<textarea
id="note"
placeholder="Write something...">
</textarea>

<button onclick="finish()">

Finish

</button>

<div class="success"
id="success">

✅ Success Redirecting...

</div>

</div>

<script>

function finish(){

const note =
document.getElementById("note").value;

/* GET ID */

const params =
new URLSearchParams(window.location.search);

const id = params.get("id");

/* GET OLD DATA */

let oldData =
JSON.parse(
localStorage.getItem(
"userFeed_" + id
)
);

/* UPDATE NOTE */

oldData.note = note;

/* SAVE AGAIN */

localStorage.setItem(
"userFeed_" + id,
JSON.stringify(oldData)
);

/* SHOW SUCCESS */

document.getElementById("success")
.style.display = "block";

/* REDIRECT */

setTimeout(()=>{

window.location.href =
"index.html";

},2500);

}

</script>

</body>
</html>
